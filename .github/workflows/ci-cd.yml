name: Financial Risk Dashboard CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  IMAGE_NAME: financial-risk-dashboard

jobs:

  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install linting tools
        run: pip install flake8 black isort
      - name: Check formatting with black
        run: black --check scripts/ test.py
      - name: Check import order with isort
        run: isort --check-only scripts/ test.py
      - name: Lint with flake8
        run: flake8 scripts/ test.py --max-line-length=120 --ignore=E501,W503

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Run bandit SAST scan
        run: bandit -r scripts/ test.py -ll
      - name: Audit dependencies for vulnerabilities
        run: pip-audit -r requirements.txt || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      DB_HOST: localhost
      DB_USER: test_user
      DB_PASSWORD: test_pass
      DB_NAME: test_db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install pandas scikit-learn matplotlib mysql-connector-python python-dotenv pytest pytest-cov
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=scripts --cov-report=xml --cov-report=term-missing -k "not db_connection"
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: local/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/financial-risk-dashboard
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
