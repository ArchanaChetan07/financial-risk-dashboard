name: Scheduled Model Retraining

on:
  schedule:
    - cron: "0 2 * * 1"  # Every Monday at 2 AM UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  retrain:
    name: Retrain Predictive Models
    runs-on: ubuntu-latest

    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install retrain dependencies
        # Lean set — full requirements.txt pins unavailable packages (tableau-api-lib==0.3.0).
        run: |
          pip install "numpy>=1.26,<2.1" "pandas>=2.0,<2.3" "scikit-learn>=1.3" \
            matplotlib python-dotenv mysql-connector-python yfinance

      - name: Refresh Yahoo data (best-effort)
        continue-on-error: true
        run: python scripts/data_collection.py

      - name: Process features (CSV always; MySQL optional)
        continue-on-error: true
        run: python scripts/data_processing.py

      - name: Retrain leakage-safe models
        run: python scripts/predictive_models.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retrained-models-${{ github.run_id }}
          path: |
            models/
            graphs/model_comparison_r2.png
          retention-days: 30

      - name: Notify on failure
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            core.warning(`Retrain failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`);
