name: Scheduled Model Retraining

on:
  schedule:
    - cron: "0 2 * * 1"  # Every Monday at 2 AM UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  retrain:
    name: Retrain Predictive Models
    runs-on: ubuntu-latest

    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data collection
        run: python scripts/data_collection.py

      - name: Run data processing
        run: python scripts/data_processing.py

      - name: Retrain models
        run: python scripts/predictive_models.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retrained-models-${{ github.run_id }}
          path: models/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Model retraining failed — ${new Date().toISOString().split('T')[0]}`,
              body: `The scheduled model retraining workflow failed.\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              labels: ['bug', 'models']
            });
