name: PR Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  pr-validation:
    name: Validate Pull Request
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt flake8 black pytest pytest-cov

      - name: Lint check
        run: flake8 scripts/ test.py --max-line-length=120

      - name: Format check
        run: black --check scripts/ test.py

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Post PR summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ All checks passed' : '❌ Some checks failed';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CI Result\n${status}\n\n- Lint: flake8 + black\n- Tests: pytest with coverage\n\nPlease fix any issues before merging.`
            });
